<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>零用金報帳系統ww</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
        }
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            background: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .app-card {
            background: var(--card);
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 24px;
            box-sizing: border-box;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header i { font-size: 40px; color: var(--primary); margin-bottom: 10px; }
        .header h1 { margin: 0; font-size: 22px; color: var(--text); }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: #475569; font-size: 14px; }
        .form-group label i { margin-right: 6px; color: var(--primary); }

        /* 稅金開關置右樣式 */
        .tax-label-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .switch-container {
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #64748b;
            cursor: pointer;
        }
        .switch-container input {
            width: auto;
            margin-right: 6px;
            transform: scale(1.2);
            cursor: pointer;
        }

        input, select, textarea { 
            width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 12px;
            font-size: 16px; box-sizing: border-box; transition: all 0.3s; background: #f8fafc;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        
        .amount-input { font-size: 22px; font-weight: bold; color: var(--text); text-align: center; }
        .tax-input { font-size: 22px; font-weight: bold; color: #e11d48; text-align: center; }
        .total-input { font-size: 24px; font-weight: bold; color: #16a34a; text-align: center; background: #f0fdf4; border-color: #bbf7d0; }

        .file-upload { 
            border: 2px dashed #cbd5e1; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer;
            transition: 0.3s; background: #f8fafc; display: block;
        }
        .file-upload:active { background: #f1f5f9; border-color: var(--primary); }
        .file-upload i { font-size: 24px; color: #64748b; margin-bottom: 5px; }
        .file-upload span { display: block; font-size: 13px; color: #64748b; }
        input[type="file"] { display: none; }
        .file-name { font-size: 12px; color: var(--primary); margin-top: 5px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        button { 
            width: 100%; padding: 16px; background: var(--primary); color: white; border: none; 
            border-radius: 16px; font-size: 18px; font-weight: bold; cursor: pointer;
            margin-top: 10px; transition: 0.3s; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        button:active { transform: scale(0.98); background: var(--primary-dark); }
        button:disabled { background: #94a3b8; box-shadow: none; }

        #loadingOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="header">
            <i class="fas fa-calculator"></i>
            <h1>零用金報帳系統ww</h1>
        </div>

        <form id="pettyCashForm">
            <div class="form-group">
                <label><i class="fas fa-calendar-day"></i> 報帳日期</label>
                <input type="date" id="date" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-user-edit"></i> 經辦人</label>
                <select id="user" required>
                    <option value="">請選擇人員...</option>
                    <option value="張琬淑">張琬淑</option>
                    <option value="潘予璇">潘予璇</option>
                    <option value="梁佳琦">梁佳琦</option>
                    <option value="吳睿憲">吳睿憲</option>
                    <option value="張芸婕">張芸婕</option>
                    <option value="張維安">張維安</option>
                    <option value="鄭宇皓">鄭宇皓</option>
                    <option value="黃俊榮">黃俊榮</option>
                    <option value="吳志鴻">吳志鴻</option>
                    <option value="謝欣穎">謝欣穎</option>
                    <option value="林靜瑜">林靜瑜</option>
                    <option value="謝文發">謝文發</option>
                    <option value="崔德偉">崔德偉</option>
                    <option value="其他">其他</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-tag"></i> 費用項目</label>
                <select id="category">
                    <option value="餐費-午餐">① 餐費-午餐</option>
                    <option value="餐費-值班">① 餐費-值班</option>
                    <option value="餐費-加班">① 餐費-加班</option>
                    <option value="快遞費">② 快遞費</option>
                    <option value="郵局掛號費">② 郵局掛號費</option>
                    <option value="文具用品">③ 文具用品</option>
                    <option value="拜拜供品">④ 拜拜供品</option>
                    <option value="義交費用">⑤ 義交費用</option>
                    <option value="其他">⑥ 其他</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-coins"></i> 未稅金額</label>
                <input type="number" id="amount" class="amount-input" inputmode="numeric" placeholder="0" required oninput="calculateAll()">
            </div>

            <div class="form-group">
                <div class="tax-label-container">
                    <label><i class="fas fa-percent"></i> 稅金</label>
                    <label class="switch-container">
                        <input type="checkbox" id="taxToggle" onchange="calculateAll()"> 需要計算稅金(5%)
                    </label>
                </div>
                <input type="number" id="tax" class="tax-input" inputmode="numeric" value="0" placeholder="0" required oninput="calculateTotalOnly()">
            </div>

            <div class="form-group">
                <label><i class="fas fa-money-check-alt"></i> 總金額 (未稅 + 稅金)</label>
                <input type="number" id="total" class="total-input" readonly value="0">
            </div>

            <div class="form-group">
                <label><i class="fas fa-comment-dots"></i> 備註原因</label>
                <textarea id="note" rows="2" placeholder="請輸入用途說明..."></textarea>
            </div>

            <div class="form-group">
                <label><i class="fas fa-camera"></i> 單據/發票照片 (必填)</label>
                <label for="receipt" class="file-upload">
                    <i class="fas fa-receipt"></i>
                    <span>點擊拍照或從相簿上傳</span>
                    <div id="receiptName" class="file-name"></div>
                </label>
                <input type="file" id="receipt" accept="image/*" required onchange="showName('receipt')">
            </div>

            <div class="form-group">
                <label><i class="fas fa-image"></i> 照片 (選填)</label>
                <label for="photo" class="file-upload">
                    <i class="fas fa-images"></i>
                    <span>點擊拍照或從相簿上傳</span>
                    <div id="photoName" class="file-name"></div>
                </label>
                <input type="file" id="photo" accept="image/*" onchange="showName('photo')">
            </div>

            <button type="submit" id="submitBtn">立即送出報帳</button>
        </form>
    </div>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-weight: bold; color: var(--primary);">資料處理中，請勿關閉視窗...</p>
    </div>

    <script>
        // 設定當前日期
        const today = new Date();
        today.setMinutes(today.getMinutes() - today.getTimezoneOffset());
        document.getElementById('date').value = today.toISOString().slice(0, 10);

        // 主計算邏輯：處理未稅、稅金、總金額
        function calculateAll() {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const isTaxRequired = document.getElementById('taxToggle').checked;
            
            let tax = 0;
            if (isTaxRequired) {
                tax = Math.round(amount * 0.05); // 有勾選，算 5%
            } else {
                tax = 0; // 沒勾選，強制歸 0
            }
            
            document.getElementById('tax').value = tax;
            
            // 計算總金額
            document.getElementById('total').value = amount + tax;
        }

        // 當使用者手動微調稅金欄位時，只重新計算總金額
        function calculateTotalOnly() {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const tax = parseFloat(document.getElementById('tax').value) || 0;
            document.getElementById('total').value = amount + tax;
        }

        function showName(id) {
            const file = document.getElementById(id).files[0];
            document.getElementById(id + 'Name').innerText = file ? "✅ 已選取：" + file.name : "";
        }

        const fileToDataURL = file => new Promise((resolve, reject) => {
            if (!file) return resolve(null);
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
            reader.readAsDataURL(file);
        });

        document.getElementById('pettyCashForm').onsubmit = async function(e) {
            e.preventDefault();
            
            // 擷取目前填寫的資料內容
            const dateVal = document.getElementById('date').value;
            const userVal = document.getElementById('user').value;
            const catVal = document.getElementById('category').value;
            const totalVal = document.getElementById('total').value;

            // 5. 彈出確認訊息框
            const confirmMessage = 
                `請確認報帳資料是否正確：\n\n` +
                `📅 日期：${dateVal}\n` +
                `👤 經辦人：${userVal}\n` +
                `🏷️ 費用項目：${catVal}\n` +
                `💰 總金額：$${totalVal} 元\n\n` +
                `確定要送出嗎？`;

            if (!confirm(confirmMessage)) {
                return; // 如果使用者點選「取消」，則中斷不送出
            }

            const btn = document.getElementById('submitBtn');
            const loader = document.getElementById('loadingOverlay');
            
            btn.disabled = true;
            loader.style.display = 'flex';

            try {
                const formData = {
                    date: dateVal,
                    user: userVal,
                    category: catVal,
                    amount: document.getElementById('amount').value,
                    tax: document.getElementById('tax').value,
                    total: totalVal, // 新增傳送總金額
                    note: document.getElementById('note').value,
                    receipt: await fileToDataURL(document.getElementById('receipt').files[0]),
                    photo: await fileToDataURL(document.getElementById('photo').files[0])
                };

                // 你的 GAS 網址已保留
                const GAS_URL = "https://script.google.com/macros/s/AKfycbyymdPFrHz7MQaeBJ_MdZhwhFSV87Nvw-ORBqAYJlnoxzjGy2NoRnFTRSXu5qoaIRW1vw/exec"; 

                const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(formData) });
                const result = await response.json();

                if (result.status === 'success') {
                    alert('🎉 報帳成功！資料已儲存。');
                    location.reload(); 
                } else {
                    alert('❌ 失敗：' + result.message);
                }
            } catch (error) {
                alert('⚠️ 系統錯誤：' + error.message);
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>零用金報帳系統ww - Capoo主題</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* 調整為咖波藍系 */
            --primary: #3498db;
            --primary-dark: #2980b9;
            --text: #2c3e50;
            --capoo-blue-bg: #87ceeb; /* 淺藍底色 */
        }
        
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
            box-sizing: border-box;
            
            /* 🎨 方案B: 咖波風景背景 (採用了Unsplash上無版權質感的藍色系插畫風格圖，模擬咖波藍) */
            /* 💡 未來如果你有特定的咖波圖床網址，可以替換下方的 url('') */
            background-image: url('https://images.unsplash.com/photo-1541123437800-1bb1317badc2?q=80&w=600&h=800&auto=format&fit=crop'); 
            background-size: cover;       /* 鋪滿 */
            background-position: center;   /* 置中 */
            background-attachment: fixed;  /* 固定背景不捲動 */
        }
        
        /* ✨ 升級為毛玻璃質感卡片 */
        .app-card {
            background: rgba(255, 255, 255, 0.92) !important; /* 92% 透明白，讓背景微透 */
            backdrop-filter: blur(10px); /* 模糊濾鏡，打造霧面玻璃感 */
            -webkit-backdrop-filter: blur(10px); /* Safari 相容 */
            width: 100%;
            max-width: 450px;
            border-radius: 28px; /* 更圓潤可愛 */
            box-shadow: 0 10px 30px rgba(52, 152, 219, 0.1); /* 咖波藍系陰影 */
            padding: 28px; /* 增加間距 */
            box-sizing: border-box;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header i { font-size: 40px; color: var(--primary); margin-bottom: 10px; }
        .header h1 { margin: 0; font-size: 22px; color: var(--text); }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: #475569; font-size: 14px; }
        .form-group label i { margin-right: 6px; color: var(--primary); }

        .tax-label-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .switch-container {
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #64748b;
            cursor: pointer;
        }
        .switch-container input {
            width: auto;
            margin-right: 6px;
            transform: scale(1.2);
            cursor: pointer;
        }

        input, select, textarea { 
            width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 12px;
            font-size: 16px; box-sizing: border-box; transition: all 0.3s; background: #fff; /* 玻璃卡片上用純白輸入框 */
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1); }
        
        .amount-input { font-size: 22px; font-weight: bold; color: var(--text); text-align: center; }
        .tax-input { font-size: 22px; font-weight: bold; color: #e11d48; text-align: center; }
        
        /* 總金額欄位採用乾淨的設計 */
        .total-input { font-size: 24px; font-weight: bold; color: #27ae60; text-align: center; background: #fff; border-color: #e2e8f0; }

        .file-upload { 
            border: 2px dashed #cbd5e1; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer;
            transition: 0.3s; background: #fff; display: block;
        }
        .file-upload:active { background: #f1f5f9; border-color: var(--primary); }
        .file-upload i { font-size: 24px; color: #64748b; margin-bottom: 5px; }
        .file-upload span { display: block; font-size: 13px; color: #64748b; }
        input[type="file"] { display: none; }
        .file-name { font-size: 12px; color: var(--primary); margin-top: 5px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        button { 
            width: 100%; padding: 16px; background: var(--primary); color: white; border: none; 
            border-radius: 18px; font-size: 18px; font-weight: bold; cursor: pointer;
            margin-top: 10px; transition: 0.3s; box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }
        button:active { transform: scale(0.98); background: var(--primary-dark); }
        button:disabled { background: #94a3b8; box-shadow: none; }

        #loadingOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.92); z-index: 100; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="header">
            <i class="fas fa-paw"></i> /* 可愛的小爪子 icon */
            <h1>零用金報帳系統ww</h1>
        </div>

        <form id="pettyCashForm">
            <div class="form-group">
                <label><i class="fas fa-calendar-day"></i> 報帳日期</label>
                <input type="date" id="date" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-user-edit"></i> 經辦人</label>
                <select id="user" required>
                    <option value="張琬淑" selected>張琬淑</option>
                    <option value="潘予璇">潘予璇</option>
                    <option value="梁佳琦">梁佳琦</option>
                    <option value="吳睿憲">吳睿憲</option>
                    <option value="張芸婕">張芸婕</option>
                    <option value="張維安">張維安</option>
                    <option value="鄭宇皓">鄭宇皓</option>
                    <option value="黃俊榮">黃俊榮</option>
                    <option value="吳志鴻">吳志鴻</option>
                    <option value="謝欣穎">謝欣穎</option>
                    <option value="林靜瑜">林靜瑜</option>
                    <option value="謝文發">謝文發</option>
                    <option value="崔德偉">崔德偉</option>
                    <option value="其他">其他</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-tag"></i> 項目</label>
                <select id="category" onchange="handleCategoryChange()">
                    <option value="午餐" selected>① 午餐</option>
                    <option value="值班餐費">② 值班餐費</option>
                    <option value="加班餐費">③ 加班餐費</option>
                    <option value="文具用品">④ 文具用品</option>
                    <option value="運費">⑤ 運費</option>
                    <option value="雜費">⑥ 雜費</option>
                    <option value="其他">⑦ 其他</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-coins"></i> 未稅金額</label>
                <input type="number" id="amount" class="amount-input" inputmode="numeric" placeholder="0" required oninput="calculateAll()">
            </div>

            <div class="form-group">
                <div class="tax-label-container">
                    <label><i class="fas fa-percent"></i> 稅金</label>
                    <label class="switch-container">
                        <input type="checkbox" id="taxToggle" onchange="calculateAll()"> 需要計算稅金(5%)
                    </label>
                </div>
                <input type="number" id="tax" class="tax-input" inputmode="numeric" value="0" placeholder="0" required oninput="calculateTotalOnly()">
            </div>

            <div class="form-group">
                <label><i class="fas fa-money-check-alt"></i> 總金額 (未稅 + 稅金)</label>
                <input type="number" id="total" class="total-input" readonly value="0">
            </div>

            <div class="form-group">
                <label id="noteLabel"><i class="fas fa-comment-dots"></i> 備註原因</label>
                <input type="text" id="note" placeholder="請輸入用途說明..." onblur="formatNoteValue()">
            </div>

            <div class="form-group">
                <label><i class="fas fa-receipt"></i> 發票號碼 / 收據編號</label>
                <input type="text" id="invoiceNumber" placeholder="請輸入發票號碼 (選填)">
            </div>

            <div class="form-group">
                <label><i class="fas fa-camera"></i> 單據/發票照片 (必填)</label>
                <label for="receipt" class="file-upload">
                    <i class="fas fa-receipt"></i>
                    <span>點擊拍照或從相簿上傳</span>
                    <div id="receiptName" class="file-name"></div>
                </label>
                <input type="file" id="receipt" accept="image/*" required onchange="showName('receipt')">
            </div>

            <div class="form-group">
                <label><i class="fas fa-image"></i> 照片 (選填)</label>
                <label for="photo" class="file-upload">
                    <i class="fas fa-images"></i>
                    <span>點擊拍照或從相簿上傳</span>
                    <div id="photoName" class="file-name"></div>
                </label>
                <input type="file" id="photo" accept="image/*" onchange="showName('photo')">
            </div>

            <button type="submit" id="submitBtn">立即送出報帳</button>
        </form>
    </div>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-weight: bold; color: var(--primary);">資料處理中，請勿關閉視窗...</p>
    </div>

    <script>
        // 設定當前日期
        const today = new Date();
        today.setMinutes(today.getMinutes() - today.getTimezoneOffset());
        document.getElementById('date').value = today.toISOString().slice(0, 10);

        function handleCategoryChange() {
            const category = document.getElementById('category').value;
            const noteInput = document.getElementById('note');
            if (category === '午餐') {
                noteInput.placeholder = "請輸入人數數字 (例如: 10)";
                noteInput.inputMode = "numeric"; // 彈出數字鍵盤
            } else {
                noteInput.placeholder = "請輸入用途說明...";
                noteInput.inputMode = "text";
            }
        }

        function formatNoteValue() {
            const category = document.getElementById('category').value;
            const noteInput = document.getElementById('note');
            let val = noteInput.value.trim();
            if (category === '午餐' && val !== "") {
                if (/^\d+$/.test(val)) {
                    noteInput.value = `<${val}人>`;
                }
            }
        }

        handleCategoryChange();

        function calculateAll() {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const isTaxRequired = document.getElementById('taxToggle').checked;
            
            let tax = 0;
            if (isTaxRequired) {
                tax = Math.round(amount * 0.05);
            } else {
                tax = 0;
            }
            
            document.getElementById('tax').value = tax;
            document.getElementById('total').value = amount + tax;
        }

        function calculateTotalOnly() {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const tax = parseFloat(document.getElementById('tax').value) || 0;
            document.getElementById('total').value = amount + tax;
        }

        function showName(id) {
            const file = document.getElementById(id).files[0];
            const nameEl = document.getElementById(id + 'Name');
            if (file) {
                nameEl.innerText = "✅ 已選取：" + file.name;
                nameEl.style.display = "block"; // 顯示檔名
            } else {
                nameEl.innerText = "";
                nameEl.style.display = "none";
            }
        }

        const fileToDataURL = file => new Promise((resolve, reject) => {
            if (!file) return resolve(null);
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
            reader.readAsDataURL(file);
        });

        document.getElementById('pettyCashForm').onsubmit = async function(e) {
            e.preventDefault();
            formatNoteValue();
            
            const dateVal = document.getElementById('date').value;
            const userVal = document.getElementById('user').value;
            const catVal = document.getElementById('category').value;
            const totalVal = document.getElementById('total').value;

            const confirmMessage = 
                `📝 報帳資料確認：\n\n` +
                `📅 日期：${dateVal}\n` +
                `👤 經辦人：${userVal}\n` +
                `🏷️ 項目：${catVal}\n` +
                `💰 總金額：$${totalVal} 元\n\n` +
                `（咖波說：資料都對嗎？🐾）`;

            if (!confirm(confirmMessage)) return;

            const btn = document.getElementById('submitBtn');
            const loader = document.getElementById('loadingOverlay');
            btn.disabled = true;
            loader.style.display = 'flex';

            try {
                const formData = {
                    date: dateVal,
                    user: userVal,
                    category: catVal,
                    amount: document.getElementById('amount').value,
                    tax: document.getElementById('tax').value,
                    total: totalVal,
                    note: document.getElementById('note').value,
                    invoiceNumber: document.getElementById('invoiceNumber').value,
                    receipt: await fileToDataURL(document.getElementById('receipt').files[0]),
                    photo: await fileToDataURL(document.getElementById('photo').files[0])
                };

                const GAS_URL = "https://script.google.com/macros/s/AKfycbyymdPFrHz7MQaeBJ_MdZhwhFSV87Nvw-ORBqAYJlnoxzjGy2NoRnFTRSXu5qoaIRW1vw/exec"; 

                const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(formData) });
                const result = await response.json();

                if (result.status === 'success') {
                    alert('🎉 報帳成功！資料已儲存到雲端了🐾');
                    location.reload(); 
                } else {
                    alert('❌ 失敗：' + result.message);
                }
            } catch (error) {
                alert('⚠️ 系統錯誤：' + error.message);
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        };
    </script>
</body>
</html>
